<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>BotC - Conteur Connecté</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <style>
        :root { --bg: #121217; --panel: #202028; --text: #f0f0f0; --good: #388e3c; --dead: #555555; --vote: #1976d2; --accent: #d32f2f; --highlight: #fbc02d; }
        body { font-family: sans-serif; background: var(--bg); color: var(--text); margin: 0; padding: 15px; }
        .panel { background: var(--panel); padding: 15px; border-radius: 8px; margin-bottom: 15px; }
        button { background: var(--vote); color: white; border: none; padding: 10px; border-radius: 6px; font-weight: bold; cursor: pointer; width: 100%; margin-bottom: 5px; }
        .btn-red { background: var(--accent); }
        .btn-green { background: var(--good); }
        .player-card { display: flex; justify-content: space-between; align-items: center; background: #2d2d38; padding: 10px; margin-bottom: 5px; border-radius: 6px; }
        .is-dead { opacity: 0.5; }
        #qrcode img { margin: 0 auto; border: 10px solid white; border-radius: 8px; }
    </style>
</head>
<body>

    <h2 style="text-align: center; color: var(--highlight);">📡 Serveur : <span id="room-id-display">----</span></h2>
    
    <div class="panel" style="text-align: center;">
        <button onclick="document.getElementById('qr-modal').style.display='block'" style="background: var(--highlight); color: black;">📱 Afficher le QR Code Joueurs</button>
        <button onclick="startGame()" class="btn-green">1. Démarrer une nouvelle partie</button>
        <button onclick="toggleTimer()" id="timer-btn" style="background: #444;">▶ Timer (5:00)</button>
    </div>

    <div class="panel" id="players-list">
        </div>

    <div id="qr-modal" style="display:none; position:fixed; top:0; left:0; right:0; bottom:0; background:rgba(0,0,0,0.9); z-index:100; text-align:center; padding: 20px;">
        <h2 style="color: white;">Scannez pour rejoindre</h2>
        <div id="qrcode" style="margin: 20px 0; display: flex; justify-content: center;"></div>
        <p style="color: #aaa;">Ou allez sur le lien de votre site et tapez le code : <strong id="room-code-text" style="color:var(--highlight); font-size:1.5em;"></strong></p>
        <button onclick="document.getElementById('qr-modal').style.display='none'" class="btn-red">Fermer</button>
    </div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
    import { getDatabase, ref, set } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js";

    const firebaseConfig = {
        apiKey: "AIzaSyBqCjtq8L-ZOLD8zbrNA-6zIAJP9FF2EGI",
        authDomain: "botc-serveur.firebaseapp.com",
        projectId: "botc-serveur",
        storageBucket: "botc-serveur.firebasestorage.app",
        messagingSenderId: "591750070297",
        appId: "1:591750070297:web:71ef07ec180aaf119c2a88"
    };

    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);

    // Fonction globale pour envoyer les infos au serveur
    window.syncToFirebase = function(publicState) {
        if(window.roomId) {
            set(ref(db, 'rooms/' + window.roomId), publicState);
        }
    }
</script>

<script>
    // --- LOGIQUE LOCALE ---
    let players = [];
    let timeRemaining = 300;
    let timerInt = null;
    let isTimerRunning = false;
    let phase = "Jour 1";
    
    // Générer un code de salon à 4 caractères
    window.roomId = localStorage.getItem('botc_room') || Math.random().toString(36).substring(2, 6).toUpperCase();
    localStorage.setItem('botc_room', window.roomId);
    
    document.getElementById('room-id-display').innerText = window.roomId;
    document.getElementById('room-code-text').innerText = window.roomId;

    // Définis ICI le lien public que GitHub t'a donné (Étape 1) !
    // Par exemple: "https://DrNono56.github.io/botc-compagnon/joueur.html"
    const githubLink = "https://DrNono56.github.io/Blood-on-the-Clocktower-compagnon-/joueur.html";
    
    // Générer le QR Code
    new QRCode(document.getElementById("qrcode"), {
        text: `${githubLink}?room=${window.roomId}`,
        width: 200, height: 200
    });

    function startGame() {
        const names = prompt("Entrez les prénoms séparés par des virgules (ex: Alice, Bob, Charlie)");
        if(!names) return;
        
        players = names.split(',').map((n, i) => ({
            id: i, 
            name: n.trim(), 
            isAlive: true, 
            hasGhostVote: true 
        })).filter(p => p.name !== "");

        timeRemaining = 300;
        phase = "Jour 1";
        updateUI();
    }

    function toggleLife(id) {
        const p = players.find(x=>x.id===id); p.isAlive = !p.isAlive; 
        updateUI();
    }

    function toggleVote(id) {
        const p = players.find(x=>x.id===id); p.hasGhostVote = !p.hasGhostVote; 
        updateUI();
    }

    function toggleTimer() {
        isTimerRunning = !isTimerRunning;
        if(isTimerRunning) {
            timerInt = setInterval(() => {
                timeRemaining--;
                document.getElementById('timer-btn').innerText = `⏸ Pause (${Math.floor(timeRemaining/60)}:${(timeRemaining%60).toString().padStart(2,'0')})`;
                if(timeRemaining <= 0) clearInterval(timerInt);
            }, 1000);
            updateUI(); // Synchronise l'ordre de départ avec Firebase
        } else {
            clearInterval(timerInt);
            document.getElementById('timer-btn').innerText = `▶ Reprendre`;
            updateUI(); // Synchronise l'arrêt
        }
    }

    function updateUI() {
        const list = document.getElementById('players-list'); list.innerHTML = '';
        players.forEach(p => {
            list.innerHTML += `
                <div class="player-card ${!p.isAlive ? 'is-dead' : ''}">
                    <strong>${p.name}</strong>
                    <div>
                        <button style="width:auto; padding:5px 10px;" class="${p.isAlive ? 'btn-green' : 'btn-red'}" onclick="toggleLife(${p.id})">❤ Vie</button>
                        ${!p.isAlive ? `<button style="width:auto; padding:5px 10px; background:var(--vote);" onclick="toggleVote(${p.id})">👻 Vote: ${p.hasGhostVote?'Oui':'Non'}</button>` : ''}
                    </div>
                </div>
            `;
        });

        // ENVOI AU SERVEUR (Ce que voient les joueurs)
        if(window.syncToFirebase) {
            window.syncToFirebase({
                phase: phase,
                timer: { running: isTimerRunning, time: timeRemaining, timestamp: Date.now() },
                players: players.map(p => ({ name: p.name, isAlive: p.isAlive, hasGhostVote: p.hasGhostVote }))
            });
        }
    }
</script>
</body>
</html>
