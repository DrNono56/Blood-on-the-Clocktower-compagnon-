<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Place du Village</title>
    <style>
        body { font-family: sans-serif; background: #121217; color: white; margin: 0; padding: 20px; text-align: center; }
        .timer { font-size: 4em; font-family: monospace; color: #fbc02d; font-weight: bold; margin: 20px 0; }
        .player-card { background: #202028; margin-bottom: 8px; padding: 15px; border-radius: 8px; display: flex; justify-content: space-between; align-items: center; border-left: 5px solid #388e3c;}
        .is-dead { opacity: 0.6; filter: grayscale(50%); border-left-color: #555;}
        .ghost-vote { background: #1976d2; padding: 4px 8px; border-radius: 4px; font-size: 0.8em; font-weight: bold;}
        .no-vote { background: transparent; border: 1px solid #555; color: #555; text-decoration: line-through;}
    </style>
</head>
<body>

    <h2 style="color: #aaa;" id="phase-display">Connexion en cours...</h2>
    <div class="timer" id="timer-display">--:--</div>
    <div id="town-square"></div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
    import { getDatabase, ref, onValue } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js";

    // MÊME CONFIG QUE LE CONTEUR
    const firebaseConfig = {
        apiKey: "AIzaSyBqCjtq8L-ZOLD8zbrNA-6zIAJP9FF2EGI",
        authDomain: "botc-serveur.firebaseapp.com",
        projectId: "botc-serveur",
        storageBucket: "botc-serveur.firebasestorage.app",
        messagingSenderId: "591750070297",
        appId: "1:591750070297:web:71ef07ec180aaf119c2a88"
    };

    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);

    // Lire le code de la room dans l'adresse URL
    const urlParams = new URLSearchParams(window.location.search);
    const roomId = urlParams.get('room');

    if(!roomId) {
        document.getElementById('phase-display').innerText = "Erreur : Aucun code de partie fourni.";
    } else {
        document.getElementById('phase-display').innerText = `Salon : ${roomId} - En attente du Conteur...`;
        
        // ECOUTER LA BASE DE DONNEES EN TEMPS REEL
        onValue(ref(db, 'rooms/' + roomId), (snapshot) => {
            const data = snapshot.val();
            if(!data) return;

            document.getElementById('phase-display').innerText = data.phase;

            // Afficher les joueurs
            const list = document.getElementById('town-square');
            list.innerHTML = '';
            if(data.players) {
                data.players.forEach(p => {
                    let ghostHtml = '';
                    if(!p.isAlive) {
                        ghostHtml = p.hasGhostVote ? `<span class="ghost-vote">👻 Vote Fantôme dispo</span>` : `<span class="ghost-vote no-vote">Vote Utilisé</span>`;
                    }
                    list.innerHTML += `
                        <div class="player-card ${!p.isAlive ? 'is-dead' : ''}">
                            <strong style="font-size: 1.2em;">${p.name}</strong>
                            ${ghostHtml}
                        </div>
                    `;
                });
            }

            // Gérer le Timer asynchrone
            manageTimer(data.timer);
        });
    }

    let localTimerInt = null;
    function manageTimer(timerData) {
        clearInterval(localTimerInt);
        if(!timerData) return;

        if(!timerData.running) {
            document.getElementById('timer-display').innerText = formatTime(timerData.time);
        } else {
            // Calcule le temps exact écoulé depuis que le Conteur a cliqué sur "Play"
            let timePassed = Math.floor((Date.now() - timerData.timestamp) / 1000);
            let currentLeft = timerData.time - timePassed;
            
            document.getElementById('timer-display').innerText = formatTime(currentLeft);
            localTimerInt = setInterval(() => {
                currentLeft--;
                if(currentLeft >= 0) document.getElementById('timer-display').innerText = formatTime(currentLeft);
                else clearInterval(localTimerInt);
            }, 1000);
        }
    }

    function formatTime(sec) {
        if(sec < 0) sec = 0;
        return Math.floor(sec/60) + ":" + (sec%60).toString().padStart(2,'0');
    }
</script>
</body>
</html>
