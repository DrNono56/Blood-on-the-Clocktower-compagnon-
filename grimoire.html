<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>BotC - Conteur Ultime V12.5</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <style>
        :root { --bg: #121217; --panel: #202028; --text: #f0f0f0; --good: #388e3c; --dead: #555555; --vote: #1976d2; --traveller: #8e24aa; --accent: #d32f2f; --highlight: #fbc02d; --nav: #1a1a22; }
        body { font-family: sans-serif; background: var(--bg); color: var(--text); margin: 0; height: 100vh; display: flex; flex-direction: column; overflow: hidden; }
        .main-content { flex: 1; overflow-y: auto; padding: 15px; padding-bottom: 70px; }
        .view-section { display: none; flex-direction: column; height: 100%; }
        .view-section.active { display: flex; }
        .panel { background: var(--panel); padding: 15px; border-radius: 8px; margin-bottom: 10px; }
        button { cursor: pointer; border: none; padding: 10px; border-radius: 6px; font-weight: bold; color: white; }
        .bottom-nav { background: var(--nav); display: flex; padding: 10px; position: fixed; bottom: 0; width: 100%; border-top: 1px solid #333; }
        .nav-btn { flex: 1; background: none; }
        .radar-box { background: var(--panel); border-radius: 8px; padding: 20px; display: flex; justify-content: center; }
        .radar-container { position: relative; width: 260px; height: 130px; border: 2px dashed #555; border-radius: 130px 130px 0 0; }
        .radar-dot { position: absolute; width: 24px; height: 24px; border-radius: 50%; display: flex; justify-content: center; align-items: center; font-size: 0.6em; border: 2px solid #000; color: white; }
    </style>
</head>
<body>

<div class="main-content">
    <div id="view-grimoire" class="view-section active">
        <div class="radar-box"><div class="radar-container" id="radar-circle"></div></div>
        <div id="grimoire-list"></div>
    </div>

    <div id="view-day" class="view-section">
        <div class="panel">
            <div id="rp-day-content" style="font-style:italic; margin-bottom:10px;"></div>
            <div id="timer-display" style="font-size:3em; font-family:monospace; text-align:center; color:var(--highlight);">05:00</div>
            <div style="display:flex; gap:5px;">
                <input type="number" id="t-min" value="5" style="width:50px;">
                <input type="number" id="t-sec" value="0" style="width:50px;">
                <button onclick="applyTimer()">Régler</button>
            </div>
            <button onclick="toggleTimer()" id="timer-btn" style="background:var(--good); width:100%; margin-top:10px;">▶ Play</button>
        </div>
    </div>

    <div id="view-menu" class="view-section">
        <div class="panel">
            <textarea id="auto-names" style="width:100%; height:80px; box-sizing:border-box;" placeholder="Alice, Bob, Charlie..."></textarea>
            <button onclick="generateGame()" style="background:var(--accent); width:100%; margin-top:5px;">Générer Partie</button>
            <div id="qrcode" style="margin-top:20px; display:flex; justify-content:center;"></div>
        </div>
    </div>
</div>

<nav class="bottom-nav">
    <button class="nav-btn" onclick="show('view-grimoire')">📖</button>
    <button class="nav-btn" onclick="show('view-day')">☀️</button>
    <button class="nav-btn" onclick="show('view-menu')">⚙️</button>
</nav>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
    import { getDatabase, ref, set } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js";
    
    // Insère ICI ton bloc firebaseConfig que tu as récupéré
    const firebaseConfig = { /* ... */ };
    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);
    window.roomId = Math.random().toString(36).substring(2, 6).toUpperCase();
    
    // QR Code
    new QRCode(document.getElementById("qrcode"), `https://ton-lien-github.io/joueur.html?room=${window.roomId}`);

    window.sync = (data) => set(ref(db, 'rooms/' + window.roomId), data);
</script>

<script>
    let players = [], timeRemaining = 300, timerInt, timerRunning = false;
    
    function show(id) {
        document.querySelectorAll('.view-section').forEach(s => s.style.display = 'none');
        document.getElementById(id).style.display = 'flex';
    }

    function generateGame() {
        const names = document.getElementById('auto-names').value.split(',');
        players = names.map((n, i) => ({ id:i, name: n.trim(), type: 'townsfolk', fakeRole: 'Villageois', reminders: [], isAlive: true }));
        render();
    }

    function render() {
        const radar = document.getElementById('radar-circle'); radar.innerHTML = '';
        const list = document.getElementById('grimoire-list'); list.innerHTML = '';
        
        players.forEach((p, i) => {
            const angle = Math.PI + (i / Math.max(1, players.length-1)) * Math.PI;
            const dot = document.createElement('div');
            dot.className = `radar-dot`;
            dot.style.left = `${130 + 110*Math.cos(angle)}px`;
            dot.style.top = `${130 + 110*Math.sin(angle)}px`;
            dot.innerText = p.name.substring(0,2);
            radar.appendChild(dot);
            
            const card = document.createElement('div');
            card.className = 'list-card';
            card.innerHTML = `<div><strong>${p.name}</strong><br>${p.fakeRole}</div>
                              <button onclick="alert('Option ajoutée !')">Note</button>`;
            list.appendChild(card);
        });
        
        // Synchro Firebase
        if(window.sync) window.sync({ players, time: timeRemaining });
    }

    function applyTimer() {
        timeRemaining = (parseInt(document.getElementById('t-min').value)*60) + parseInt(document.getElementById('t-sec').value);
        document.getElementById('timer-display').innerText = Math.floor(timeRemaining/60) + ":" + (timeRemaining%60).toString().padStart(2,'0');
    }

    function toggleTimer() {
        timerRunning = !timerRunning;
        if(timerRunning) {
            timerInt = setInterval(() => {
                timeRemaining--;
                document.getElementById('timer-display').innerText = Math.floor(timeRemaining/60) + ":" + (timeRemaining%60).toString().padStart(2,'0');
                if(timeRemaining <= 0) clearInterval(timerInt);
                render(); // Resync firebase
            }, 1000);
        } else {
            clearInterval(timerInt);
        }
    }
</script>
</body>
</html>
